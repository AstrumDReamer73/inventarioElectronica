<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{index::head}"></head>
<body>
<style th:replace="~{index::style}"></style>
<section class="vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6 text-center">
                <img th:src="@{/img/logo-TecNM.png}"
                     class="img-fluid mx-auto d-block"
                     alt="Imagen del Tec" />
            </div>
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header"><p class="fs-4 text-center mb-0">Reestablecer su contraseña</p></div>
                    <div class="card-body">
                        <form th:action="@{/forgotPassword}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Correo</label>
                                <input class="form-control" type="text" name="email"
                                       placeholder="Ingrese su correo">
                            </div>
                            <div th:if="${session.errorMessage}" th:text="${session.errorMessage}" class="alert alert-danger"></div>
                            <button type="submit" class="btn btn-primary w-100">Enviar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
