<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{index::head}"></head>
<body>
<style th:replace="~{index::style}"></style>
<header th:replace="~{index::navbar}"></header>
<h1 class="text-center mb-3" th:text="|Expediente de mantenimiento de la ${mesa}|"></h1>
<div class="container mt-4">
    <table class="table table-striped table-border">
        <thead class="table-dark">
        <tr>
            <th scope="col">Personal encargado</th>
            <th scope="col">Fecha de entrada</th>
            <th scope="col">Fecha de salida</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e:${expedientes}">
            <td th:text="${e.numeroControl.nombre}"></td>
            <td th:text="${#dates.format(e.fechaEntrada,'dd-MM-yyyy')}"></td>
            <td th:text="${#dates.format(e.fechaSalida,'dd-MM-yyyy')}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
