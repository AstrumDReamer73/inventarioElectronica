<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{index::head}"></head>
<body>
<style th:replace="~{index::style}"></style>
<header th:replace="~{index::navbar}"></header>
<div class="container mt-4">
    <div th:replace="~{listas/listaArticulos::success}"></div>
    <h1 class="text-center mb-3">Banco de practicas</h1>
    <div class="col-12 text-end">
        <a class="btn btn-success"
           th:href="@{/practicas/registrar}"
           sec:authorize="!hasAnyAuthority('Docencia')">Registrar Practica</a>
    </div>
    <table id="practicasTable" class="table table-striped table-border">
        <thead class="table-dark">
        <tr>
            <th scope="col">Nombre</th>
            <th scope="col">Materia</th>
            <th scope="col">Descripcion</th>
            <th sec:authorize="!hasAnyAuthority('Docencia')"></th>
        </tr>
        </thead>
        <tbody class="table-group-divider">
        <tr th:each="practica : ${practicas}">
            <td th:text="${practica.nombre}"></td>
            <td th:text="${practica.materia.nombreMateria}"></td>
            <td>
                <a class="btn btn-sm btn-outline-primary"
                   th:href="@{'/practicas/pdf/'+${practica.IDPracticas}}"
                   target="_blank">Ver <i class="fa fa-eye"></i></a>
                <a class="btn btn-sm btn-outline-success"
                   th:href="@{'/practicas/pdf/'+${practica.IDPracticas}}">
                    Descargar <i class="fa fa-download"></i></a>
            </td>
            <td sec:authorize="!hasAnyAuthority('Docencia')">
                <a class="btn btn-primary btn-sm" th:href="@{'/practicas/editar/'+${practica.IDPracticas}}">modificar</a>
                <a class="btn btn-danger btn-sm" th:href="@{'/practicas/eliminar/'+${practica.IDPracticas}}"
                   onclick="return confirm('estas seguro')">eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<footer th:replace="~{listas/dataTable::dataTable('practicasTable')}"></footer>
<script th:replace="~{listas/listaArticulos::script}"></script>
</body>
</html>
