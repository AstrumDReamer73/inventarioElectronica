<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{index::head}"></head>
<body>
<style th:replace="~{index::style}"></style>
<div class="container mt-4">
    <div class="card shadow mb-4">
        <div class="card-header text-center"><h5>Pantalla de confirmación</h5></div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la práctica</label>
                        <p class="form-control" th:text="${practica.nombre}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Materia</label>
                        <p class="form-control" th:text="${practica.materia}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Grupo</label>
                        <p class="form-control" th:text="${asignacion.claveGrupo}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Maestro</label>
                        <p class="form-control" th:text="${grupo.numeroControl.nombre}"></p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Lugar</label>
                        <p class="form-control" th:text="${mesa}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Horario</label>
                        <p class="form-control" th:text="|${grupo.horaEntrada} - ${grupo.horaSalida}|"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha</label>
                        <p class="form-control" th:text="${asignacion.fecha}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estado</label>
                        <p class="form-control" th:text="${asignacion.estado}"></p>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <table id="insumosAsignados" class="table table-striped table-bordered">
                    <thead class="table-dark table-striped-columns">
                    <tr>
                        <th scope="col">Número de serie</th>
                        <th scope="col">Modelo</th>
                        <th scope="col">Descripción</th>
                        <th scope="col">Categoría</th>
                        <th scope="col">Marca</th>
                        <th scope="col">Ubicación</th>
                        <th scope="col">Fecha del último mantenimiento</th>
                        <th scope="col">Estado</th>
                    </tr>
                    </thead>
                    <tbody class="table-group-divider">
                    <tr th:each="insumo:${insumos}">
                        <td th:text="${insumo.numeroSerie}"></td>
                        <td th:text="${insumo.modelo}"></td>
                        <td th:text="${insumo.descripcion}"></td>
                        <td th:text="${insumo.categoria}"></td>
                        <td th:text="${insumo.marca}"></td>
                        <td th:text="${insumo.ubicacion}"></td>
                        <td th:text="${insumo.fechaUltimoMantenimiento}"></td>
                        <td th:text="${insumo.estado}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="card card-sh mb-3 mx-auto" style="max-width: 700px;">
                <div class="card-body d-flex justify-content-center gap-3">
                    <a class="btn btn-primary" th:href="@{/practicas/registrar}">Registro de práctica</a>
                    <a class="btn btn-primary" th:href="@{/practicas/asignacion/asignar/{id}(id=${practica.IDPractica}, claveGrupo=${asignacion.claveGrupo})}">Pantalla de asignación</a>
                    <a class="btn btn-primary" th:href="@{/practicas/asignarInsumos}">Asignación de insumos</a>
                </div>
            </div>
            <div class="card card-sh mb-3 mx-auto" style="max-width: 400px;">
                <div class="card-body d-flex justify-content-center gap-3">
                    <form th:action="@{/practicas/confirmar}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-success">Guardar práctica</button>
                    </form>
                    <a class="btn btn-danger" th:href="@{/practicas}"
                       onclick="return confirm('¿Está seguro que desea cancelar el registro? Los datos no se guardarán')">
                        Cancelar registro
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
