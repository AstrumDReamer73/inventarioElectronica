<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{index::head}"></head>
<body>
<style th:replace="~{index::style}"></style>
<header th:replace="~{index :: navbar}"></header>
<h1 class="text-center">Lista de Usuarios</h1>
<div th:replace="~{listas/listaArticulos::success}"></div>
<div class="container mt-4">
    <div class="col-12 text-end mb-3">
        <a class="btn btn-danger" th:href="@{/usuarios/exportarPDF}">
            <i class="fa-regular fa-file-pdf"></i>
            Exportar PDF
        </a>
        <a class="btn btn-success" th:href="@{/usuarios/exportarExcel}">
            <i class="fa-regular fa-file-excel"></i>
            Exportar Excel</a>
        <a class="btn btn-success"
           th:href="@{/usuarios/registrar}"
           sec:authorize="!hasAnyAuthority('Docencia','Maestro')">
            <i class="fa-solid fa-plus"></i>
            Registrar Usuarios</a>
    </div>
    <table id="usuariosTable" class="table table-striped table-border">
        <thead class="table-dark">
        <tr>
            <th scope="col">Numero de control</th>
            <th scope="col">Nombre</th>
            <th scope="col">Correo</th>
            <th scope="col">Telefono</th>
            <th scope="col">Cargo</th>
            <th sec:authorize="!hasAnyAuthority('Docencia','Maestro')"></th>
        </tr>
        </thead>
        <tbody class="table-group-divider align-middle">
        <tr th:each="usuario:${usuarios}">
            <td th:text="${usuario.numeroControl}"></td>
            <td th:text="${usuario.nombre}"></td>
            <td th:text="${usuario.correo}"></td>
            <td th:text="${usuario.telefono}"></td>
            <td th:text="${usuario.rol}"></td>
            <td sec:authorize="!hasAnyAuthority('Docencia','Maestro')">
                <div class="content-center text-center">
                    <a class="btn btn-primary btn-sm d-flex justify-content-center align-items-center flex-fill mb-1"
                       th:href="@{'/usuarios/editar/'+${usuario.numeroControl}}">Editar</a>
                    <a class="btn btn-danger btn-sm d-flex justify-content-center align-items-center flex-fill mb-1"
                       th:href="@{'/usuarios/eliminar/'+${usuario.numeroControl}}"
                       onclick="return confirm('¿Estás seguro?')">Eliminar</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<footer th:replace="~{listas/dataTable::dataTable('usuariosTable')}"></footer>
<script th:replace="~{listas/listaArticulos::script}"></script>
</body>
</html>
